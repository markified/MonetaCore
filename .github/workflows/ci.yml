name: MonetaCore CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MonetaCore.sln

      - name: Build
        run: dotnet build MonetaCore.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MonetaCore.Tests/MonetaCore.Tests.csproj --configuration Release --no-build --verbosity normal
